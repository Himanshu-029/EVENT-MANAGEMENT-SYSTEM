{% extends 'events/base.html' %}
{% block content %}
<style>
  body { background: #fff0fa !important; background-image: none !important; }
  body::before { display: none !important; }
  .container.mt-5 { margin-top: 0 !important; max-width: 100% !important; padding: 0 !important; }
  :root { --pink: #ff6eb4; --lavender: #c084fc; --lemon: #ffe566; --bg: #fff0fa; --dark: #1a1035; }
  .sp-page { min-height: 90vh; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
  .sp-card { background: #fff; border: 3px solid var(--dark); border-radius: 28px; overflow: hidden; box-shadow: 8px 8px 0 var(--dark); width: 100%; max-width: 440px; }
  .sp-banner { background: var(--lavender); border-bottom: 3px solid var(--dark); padding: 2rem; text-align: center; }
  .sp-banner h2 { font-family: 'Boogaloo', cursive; font-size: 2rem; color: #fff; margin: 0.5rem 0 0.2rem; }
  .sp-banner p { color: rgba(255,255,255,0.7); font-size: 0.85rem; font-weight: 600; margin: 0; }
  .sp-body { padding: 2rem; }
  .field-group { margin-bottom: 1.1rem; }
  .field-label { font-family: 'Fredoka One', cursive; font-size: 0.9rem; color: var(--dark); display: block; margin-bottom: 0.4rem; }
  .field-input { width: 100%; background: var(--bg) !important; border: 2.5px solid var(--dark) !important; border-radius: 100px !important; padding: 0.7rem 1.3rem !important; font-family: 'Nunito', sans-serif !important; font-size: 0.95rem !important; font-weight: 700 !important; outline: none !important; box-shadow: 3px 3px 0 var(--dark) !important; color: var(--dark) !important; box-sizing: border-box; }
  .btn-set { width: 100%; background: var(--lavender) !important; color: #fff !important; border: 2.5px solid var(--dark) !important; border-radius: 100px !important; padding: 0.85rem !important; font-family: 'Fredoka One', cursive !important; font-size: 1.1rem !important; cursor: pointer !important; box-shadow: 4px 4px 0 var(--dark) !important; transition: all 0.2s !important; }
  .btn-set:hover { transform: translate(-2px,-2px) !important; box-shadow: 6px 6px 0 var(--dark) !important; }
  .msg-box { border: 2px solid var(--dark); border-radius: 14px; padding: 0.7rem 1rem; font-family: 'Fredoka One', cursive; font-size: 0.88rem; box-shadow: 2px 2px 0 var(--dark); margin-bottom: 1rem; text-align: center; }
  .msg-error { background: #ffe4e0; }
  .hint { font-size: 0.7rem; color: rgba(26,16,53,0.4); font-weight: 600; margin-top: 0.3rem; padding-left: 0.5rem; }
</style>

<div class="sp-page">
  <div class="sp-card">
    <div class="sp-banner">
      <div style="font-size:3rem">🔒</div>
      <h2>Set New Password</h2>
      <p>OTP verified! Choose a strong password</p>
    </div>

    <div class="sp-body">
      {% if messages %}
        {% for message in messages %}
          <div class="msg-box msg-error">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="field-group">
          <label class="field-label">🔒 New Password</label>
          <input type="password" name="password1" class="field-input" placeholder="Min 8 characters" required>
          <div class="hint">Must be at least 8 characters</div>
        </div>
        <div class="field-group">
          <label class="field-label">🔒 Confirm Password</label>
          <input type="password" name="password2" class="field-input" placeholder="Repeat password" required>
        </div>
        <button type="submit" class="btn-set">🔐 Set New Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
