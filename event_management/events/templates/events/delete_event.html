{% extends 'events/base.html' %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow-sm">

<div class="card-body text-center">

<h3 class="text-danger mb-3">Delete Event</h3>

<div class="alert alert-warning">

<p class="mb-1">Are you sure you want to delete this event?</p>

<h5 class="mt-2"><strong>{{ event.title }}</strong></h5>

<p class="text-muted">This action cannot be undone.</p>

</div>

<form method="post">
{% csrf_token %}

<button type="submit" class="btn btn-danger">
Yes, Delete Event
</button>

<a href="{% url 'event_detail' event.id %}" class="btn btn-secondary ms-2">
Cancel
</a>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
