<!DOCTYPE html>
<html>
<head>

<title>EventHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= PAGE BACKGROUND ================= */

body{
    background-image:url("/static/images/hero-bg.png");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}


/* ================= DARK OVERLAY ================= */

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.25);
    z-index:-1;
}


/* ================= HERO SECTION ================= */

.hero-box{

    position:relative;

    padding:60px;

    border: radius 50px;

    text-align:center;

    overflow:hidden;

}


/* HERO BACKGROUND LAYER */

.hero-box::after{

    content:"";

    position:absolute;

    top:0;
    left:10;

    width:100%;
    height:100%;

    background:rgba(255, 255, 255, 0.75);

    z-index:0;

}


/* WORLD MAP LAYER */

.hero-box::before{

    content:"";

    position:absolute;

    top:0;
    left:0;

    width: 100%;
    height:100%;

    background:url("/static/images/world-map.png");

    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;

    opacity:0.9;

    z-index:1;

}


/* HERO TEXT LAYER */

.hero-box h1,
.hero-box p{

    position:relative;

    z-index:2;

}

.hero-box h1{

    font-size:48px;

    font-weight:700;

}

.hero-box p{

    font-size:18px;

}


/* ================= EVENT CARDS ================= */

.event-card{

    border-radius:12px;

    padding:20px;

    background:white;

    box-shadow:0 6px 18px rgba(0,0,0,0.2);

    transition:0.3s;

}

.event-card:hover{

    transform:translateY(-6px);

}


/* ================= NAVBAR ================= */

.navbar a{
    text-decoration:none;
}

.navbar a:hover{
    text-decoration:underline;
}

</style>

</head>


<body>


<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-dark bg-dark px-4">

<a class="navbar-brand" href="/">EventHub</a>

<div>

<a class="text-light me-3" href="/create">
<i class="fa-solid fa-circle-plus"></i> Create Event
</a>

<a class="text-light me-3" href="/my-bookings">
<i class="fa-solid fa-ticket"></i> My Bookings
</a>

<a class="text-light me-3" href="/dashboard">
<i class="fa-solid fa-chart-line"></i> Dashboard
</a>

<a class="text-light me-3" href="/verify-ticket">
<i class="fa-solid fa-check-circle"></i> Verify Ticket
</a>

<span class="text-warning me-3">
<i class="fa-solid fa-user"></i> Himanshu
</span>

<a class="text-danger" href="/logout">
<i class="fa-solid fa-right-from-bracket"></i> Logout
</a>

</div>

</nav>


<div class="container mt-5">

{% block content %}

{% endblock %}

</div>


</body>
</html>
