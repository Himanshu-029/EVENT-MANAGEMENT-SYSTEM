{% extends 'events/base.html' %}
{% block content %}
<style>
  body { background: #fff0fa !important; background-image: none !important; }
  body::before { display: none !important; }
  .container.mt-5 { margin-top: 0 !important; max-width: 100% !important; padding: 0 !important; }
  :root { --pink: #ff6eb4; --mint: #5ee7bf; --bg: #fff0fa; --dark: #1a1035; }
  .page { min-height: 90vh; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
  .card { background: #fff; border: 3px solid var(--dark); border-radius: 28px; box-shadow: 8px 8px 0 var(--dark); width: 100%; max-width: 460px; text-align: center; padding: 3rem 2rem; }
  .card h2 { font-family: 'Boogaloo', cursive; font-size: 2rem; color: var(--dark); margin: 1rem 0 0.5rem; }
  .card p { color: rgba(26,16,53,0.6); font-weight: 600; margin-bottom: 2rem; }
  .btn { display: inline-block; background: var(--pink) !important; color: #fff !important; border: 2.5px solid var(--dark) !important; border-radius: 100px !important; padding: 0.75rem 2rem !important; font-family: 'Fredoka One', cursive !important; font-size: 1rem !important; box-shadow: 4px 4px 0 var(--dark) !important; transition: all 0.2s !important; text-decoration: none !important; }
  .btn:hover { transform: translate(-2px,-2px) !important; box-shadow: 6px 6px 0 var(--dark) !important; }
</style>
<div class="page">
  <div class="card">
    <div style="font-size:4rem">🎉</div>
    <h2>Password Changed!</h2>
    <p>Your password has been successfully reset.<br>You can now login with your new password!</p>
    <a href="{% url 'login' %}" class="btn">🚀 Login Now</a>
  </div>
</div>
{% endblock %}
