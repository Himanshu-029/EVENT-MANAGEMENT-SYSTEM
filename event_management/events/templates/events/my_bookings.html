{% extends 'events/base.html' %}

{% block content %}

<h2>My Bookings</h2>

{% for booking in bookings %}
    <div class="event-card">
        <h3>{{ booking.event.title }}</h3>
        <p>{{ booking.event.location }}</p>
        <p>{{ booking.event.date }}</p>
    </div>
{% empty %}
    <p>You have not booked any events yet.</p>
{% endfor %}

{% endblock %}
