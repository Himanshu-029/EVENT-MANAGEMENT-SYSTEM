{% extends 'events/base.html' %}
{% block content %}
<style>
  body { background: #fff0fa !important; background-image: none !important; }
  body::before { display: none !important; }
  .container.mt-5 { margin-top: 0 !important; max-width: 100% !important; padding: 0 !important; }
  :root { --pink: #ff6eb4; --sky: #74c7f5; --mint: #5ee7bf; --lemon: #ffe566; --bg: #fff0fa; --dark: #1a1035; }
  .page { min-height: 90vh; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
  .card { background: #fff; border: 3px solid var(--dark); border-radius: 28px; overflow: hidden; box-shadow: 8px 8px 0 var(--dark); width: 100%; max-width: 460px; }
  .banner { background: var(--sky); border-bottom: 3px solid var(--dark); padding: 2rem; text-align: center; }
  .banner h2 { font-family: 'Boogaloo', cursive; font-size: 2rem; color: var(--dark); margin: 0.5rem 0 0.2rem; }
  .banner p { color: rgba(26,16,53,0.6); font-size: 0.85rem; font-weight: 600; margin: 0; }
  .body { padding: 2rem; }
  .field-label { font-family: 'Fredoka One', cursive; font-size: 0.92rem; color: var(--dark); display: block; margin-bottom: 0.45rem; }
  .field-input { width: 100%; background: var(--bg) !important; border: 2.5px solid var(--dark) !important; border-radius: 100px !important; padding: 0.75rem 1.3rem !important; font-family: 'Nunito', sans-serif !important; font-size: 0.95rem !important; font-weight: 700 !important; outline: none !important; box-shadow: 3px 3px 0 var(--dark) !important; color: var(--dark) !important; box-sizing: border-box; }
  .btn-submit { width: 100%; background: var(--sky) !important; color: var(--dark) !important; border: 2.5px solid var(--dark) !important; border-radius: 100px !important; padding: 0.85rem !important; font-family: 'Fredoka One', cursive !important; font-size: 1.1rem !important; cursor: pointer !important; box-shadow: 4px 4px 0 var(--dark) !important; transition: all 0.2s !important; margin-top: 1rem; }
  .btn-submit:hover { transform: translate(-2px,-2px) !important; box-shadow: 6px 6px 0 var(--dark) !important; }
  .footer { text-align: center; padding: 1.2rem; background: var(--bg); border-top: 2px solid rgba(26,16,53,0.08); font-size: 0.85rem; font-weight: 700; }
  .footer a { color: var(--pink) !important; text-decoration: none !important; border-bottom: 2px solid var(--pink); }
</style>
<div class="page">
  <div class="card">
    <div class="banner">
      <div style="font-size:3rem">🔑</div>
      <h2>Forgot Password?</h2>
      <p>Enter your email and we'll send a reset link</p>
    </div>
    <div class="body">
      <form method="post">
        {% csrf_token %}
        <label class="field-label">📧 Email Address</label>
        <input type="email" name="email" class="field-input" placeholder="your@email.com" required>
        <button type="submit" class="btn-submit">📨 Send Reset Link</button>
      </form>
    </div>
    <div class="footer">
      Remember your password? <a href="{% url 'login' %}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
