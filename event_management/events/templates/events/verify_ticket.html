{% extends 'events/base.html' %}

{% block content %}

<h2>Verify Ticket</h2>

<form method="post">
    {% csrf_token %}
    <input type="number" name="booking_id" placeholder="Enter Booking ID">
    <button type="submit">Verify</button>
</form>

{% if result %}
    <div class="event-card">
        <h3>{{ result }}</h3>
    </div>
{% endif %}

{% endblock %}
