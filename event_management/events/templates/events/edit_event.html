{% extends 'events/base.html' %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow-sm">

<div class="card-body">

<h3 class="mb-4">Edit Event</h3>

<form method="post" enctype="multipart/form-data">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Title</label>
<input type="text" name="title" class="form-control" value="{{ event.title }}" required>
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea name="description" class="form-control" rows="4">{{ event.description }}</textarea>
</div>

<div class="mb-3">
<label class="form-label">Location</label>
<input type="text" name="location" class="form-control" value="{{ event.location }}">
</div>

<div class="mb-3">
<label class="form-label">Date & Time</label>
<input type="datetime-local" name="date" class="form-control"
value="{{ event.date|date:'Y-m-d\\TH:i' }}">
</div>

<div class="mb-3">
<label class="form-label">Capacity</label>
<input type="number" name="capacity" class="form-control" value="{{ event.capacity }}">
</div>

<div class="mb-3">
<label class="form-label">Update Image</label>

{% if event.image %}
<p class="mb-2">Current Image:</p>
<img src="{{ event.image.url }}" width="200" class="mb-3 rounded">
{% endif %}

<input type="file" name="image" class="form-control">
</div>

<button type="submit" class="btn btn-primary">
Update Event
</button>

<a href="{% url 'event_detail' event.id %}" class="btn btn-secondary ms-2">
Cancel
</a>

</form>

</div>
</div>

</div>
</div>

{% endblock %}
